<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека аудиокниг | 7-9 классы</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Библиотека аудиокниг</h1>
        <p>Произведения школьной программы для 7-9 классов</p>
        <button class="theme-toggle" id="themeToggle" title="Переключить тему" aria-label="Переключить тему">
            🌙
        </button>
    </header>

    <section class="filters">
        <div class="filters-header" id="filtersHeader">
            <h2>Фильтры</h2>
            <span class="filters-toggle-icon" id="filtersToggleIcon">▼</span>
        </div>
        <div class="filters-content" id="filtersContent">
            <div class="filters-container">
                <div class="filter-group">
                    <label for="searchInput">Поиск по названию</label>
                    <input type="text" id="searchInput" placeholder="Введите название книги..." />
                </div>
                <div class="filter-group">
                    <label for="classFilter">Класс</label>
                    <select id="classFilter">
                        <option value="">Все классы</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="authorFilter">Автор</label>
                    <select id="authorFilter">
                        <option value="">Все авторы</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="genreFilter">Жанр</label>
                    <select id="genreFilter">
                        <option value="">Все жанры</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sortFilter">Сортировка</label>
                    <select id="sortFilter">
                        <option value="default">По умолчанию</option>
                        <option value="title-asc">По названию (А-Я)</option>
                        <option value="title-desc">По названию (Я-А)</option>
                        <option value="author-asc">По автору (А-Я)</option>
                        <option value="author-desc">По автору (Я-А)</option>
                        <option value="class-asc">По классу (возр.)</option>
                        <option value="class-desc">По классу (убыв.)</option>
                    </select>
                </div>
                <button class="reset-btn" id="resetBtn">Сбросить</button>
            </div>
        </div>
    </section>

    <main>
        <div class="info-bar">
            <p id="booksCount">Найдено книг: 0</p>
            <div class="current-filters" id="currentFilters"></div>
        </div>

        <div class="books-grid" id="booksGrid">
            <!-- Карточки книг будут добавлены через JavaScript -->
        </div>
    </main>

    <footer>
        <p>Библиотека аудиокниг | Социальный проект 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
