<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- ================================================
         БИБЛИОТЕКА АУДИОКНИГ ДЛЯ ШКОЛЬНИКОВ 7-9 КЛАССОВ
         
         Этот файл содержит структуру страницы библиотеки.
         Для изменения данных книг редактируйте файл books.json
         ================================================ -->
    
    <!-- Кодировка символов -->
    <meta charset="UTF-8">
    
    <!-- Настройка масштабирования для мобильных устройств -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Описание страницы для поисковых систем -->
    <meta name="description" content="Библиотека аудиокниг по школьной программе для 7, 8 и 9 классов. Слушайте произведения из школьной программы онлайн.">
    
    <!-- Ключевые слова -->
    <meta name="keywords" content="аудиокниги, школьная программа, 7 класс, 8 класс, 9 класс, литература, слушать онлайн">
    
    <!-- Автор страницы -->
    <meta name="author" content="Uchitelnik">
    
    <!-- Заголовок вкладки браузера -->
    <title>Библиотека аудиокниг | 7-9 классы</title>
    
    <!-- Подключение файла стилей -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Иконка сайта (favicon) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
    <!-- ================================================
         ШАПКА САЙТА
         ================================================ -->
    <header>
        <!-- Главный заголовок сайта -->
        <h1>Библиотека аудиокниг</h1>
        <!-- Подзаголовок с описанием -->
        <p>Произведения школьной программы для 7-9 классов</p>
    </header>

    <!-- ================================================
         СЕКЦИЯ ФИЛЬТРОВ
         Здесь находятся выпадающие списки для фильтрации книг
         ================================================ -->
    <section class="filters">
        <h2>Фильтры</h2>
        
        <!-- Контейнер для выпадающих списков -->
        <div class="filters-container">
            
            <!-- Фильтр по классу -->
            <div class="filter-group">
                <label for="classFilter">Класс:</label>
                <!-- Выпадающий список классов -->
                <select id="classFilter">
                    <option value="">Все классы</option>
                    <!-- Остальные опции добавляются через JavaScript -->
                </select>
            </div>
            
            <!-- Фильтр по автору -->
            <div class="filter-group">
                <label for="authorFilter">Автор:</label>
                <!-- Выпадающий список авторов -->
                <select id="authorFilter">
                    <option value="">Все авторы</option>
                    <!-- Остальные опции добавляются через JavaScript -->
                </select>
            </div>
            
            <!-- Фильтр по жанру -->
            <div class="filter-group">
                <label for="genreFilter">Жанр:</label>
                <!-- Выпадающий список жанров -->
                <select id="genreFilter">
                    <option value="">Все жанры</option>
                    <!-- Остальные опции добавляются через JavaScript -->
                </select>
            </div>
            
            <!-- Кнопка сброса фильтров -->
            <button class="reset-btn" id="resetBtn">🔄 Сбросить фильтры</button>
            
        </div>
    </section>

    <!-- ================================================
         ОСНОВНОЙ КОНТЕНТ
         ================================================ -->
    <main>
        <!-- Информационная панель с количеством найденных книг -->
        <div class="info-bar">
            <p id="booksCount">Найдено книг: 0</p>
            <!-- Контейнер для отображения активных фильтров -->
            <div class="current-filters" id="currentFilters"></div>
        </div>
        
        <!-- Контейнер для карточек книг -->
        <!-- Карточки добавляются через JavaScript -->
        <div class="books-grid" id="booksGrid">
            <!-- Сюда будут добавляться карточки книг -->
        </div>
    </main>

    <!-- ================================================
         ПОДВАЛ САЙТА
         ================================================ -->
    <footer>
        <p>Библиотека аудиокниг | Социальный проект 2026</p>
        <p style="font-size: 0.8rem; margin-top: 5px; opacity: 0.7;">
        </p>
    </footer>

    <!-- ================================================
         ПОДКЛЮЧЕНИЕ JAVASCRIPT
         ================================================ -->
    <script src="script.js"></script>
</body>
</html>
